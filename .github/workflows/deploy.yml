name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://sbsrmkexanytrbtjwhhz.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_VQKPCku-_MHRiE_tDSgDRA_wXMPUMeF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
